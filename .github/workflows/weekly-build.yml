name: Weekly Docker Build and Push

on:
  schedule:
    # Run every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggering

env:
  REGISTRY: docker.io
  IMAGE_NAME: nuhotetotniksvoboden/bootc-desktop-base

jobs:
  weekly-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | sudo podman login ${{ env.REGISTRY }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Get date tag
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker system prune -af
        df -h

    - name: Build image with Podman
      run: |
        LOCAL_TAG="localhost/bootc-desktop-base:latest"
        REMOTE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        REMOTE_DATE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.date }}"
        REMOTE_WEEKLY_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:weekly"
        
        echo "Building image..."
        sudo podman build -f Containerfile -t $LOCAL_TAG -t $REMOTE_TAG -t $REMOTE_DATE_TAG -t $REMOTE_WEEKLY_TAG .
        
        echo "Built image with tags:"
        sudo podman images | grep bootc-desktop-base

    - name: Push to Docker Hub
      run: |
        REMOTE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        REMOTE_DATE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.date }}"
        REMOTE_WEEKLY_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:weekly"
        
        echo "Pushing $REMOTE_TAG to Docker Hub..."
        sudo podman push $REMOTE_TAG
        
        echo "Pushing $REMOTE_DATE_TAG to Docker Hub..."
        sudo podman push $REMOTE_DATE_TAG
        
        echo "Pushing $REMOTE_WEEKLY_TAG to Docker Hub..."
        sudo podman push $REMOTE_WEEKLY_TAG
